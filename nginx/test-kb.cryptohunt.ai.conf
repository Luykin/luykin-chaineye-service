server {
    server_name kb.cryptohunt.ai;
    
    # SSE (Server-Sent Events) 路由 - 必须放在其他 location 之前
    location ~* ^/api/xhunt/sse {
        # 禁用所有缓冲，确保 SSE 实时传输
        proxy_buffering off;
        proxy_cache off;
        proxy_request_buffering off;
        
        # 设置 SSE 响应头
        proxy_set_header Connection "";
        proxy_http_version 1.1;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $host;
        
        # SSE 传输超时设置（长连接）
        proxy_connect_timeout 60s;
        proxy_send_timeout 0;      # 无发送超时
        proxy_read_timeout 0;      # 无读取超时（保持连接）
        
        # 禁用 gzip 压缩（SSE 响应需要实时传输）
        proxy_set_header Accept-Encoding "";
        
        # 设置 SSE 响应头
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Connection "keep-alive" always;
        add_header X-Accel-Buffering "no" always;
        add_header Content-Type "text/event-stream" always;
        
        # 添加 CORS 头
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Request-Timestamp, x-request-id, x-request-timestamp, x-device-fingerprint, x-request-signature, x-extension-version, x-user-id, x-window-location-href, x-collector-client-token, x-admin, Admin" always;
        add_header Access-Control-Allow-Credentials "true" always;
        
        # 处理预检请求 (OPTIONS)
        if ($request_method = OPTIONS ) {
            add_header Access-Control-Allow-Origin *;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS";
            add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Request-Timestamp, x-request-id, x-request-timestamp, x-device-fingerprint, x-request-signature, x-extension-version, x-user-id, x-window-location-href, x-collector-client-token, x-admin, Admin";
            return 204;
        }
        
        # 代理到你的 Node.js 服务
        proxy_pass http://127.0.0.1:8090;
        
        # 错误处理
        proxy_intercept_errors on;
        error_page 502 503 504 /50x.html;
    }
    
    # 流式代理路由 - 必须放在其他 location 之前
    location ~* ^/api/xhunt/proxy/public-stream/ {
        # 禁用所有缓冲，确保流式传输
        proxy_buffering off;
        proxy_cache off;
        proxy_request_buffering off;
        
        # 设置流式响应头
        proxy_set_header Connection "";
        proxy_http_version 1.1;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $host;
        
        # 流式传输超时设置
        proxy_connect_timeout 60s;
        proxy_send_timeout 0;      # 无发送超时
        proxy_read_timeout 0;      # 无读取超时
        
        # 禁用 gzip 压缩（流式响应不需要）
        proxy_set_header Accept-Encoding "";
        
        # 设置流式响应头
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Connection "keep-alive" always;
        add_header X-Accel-Buffering "no" always;
        
        # 添加 CORS 头
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Request-Timestamp, x-request-id, x-request-timestamp, x-device-fingerprint, x-request-signature, x-extension-version, x-user-id, x-window-location-href, x-collector-client-token, x-admin" always;
        add_header Access-Control-Allow-Credentials "true" always;
        
        # 处理预检请求 (OPTIONS)
        if ($request_method = OPTIONS ) {
            add_header Access-Control-Allow-Origin *;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS";
            add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Request-Timestamp, x-request-id, x-request-timestamp, x-device-fingerprint, x-request-signature, x-extension-version, x-user-id, x-window-location-href, x-collector-client-token, x-admin";
            return 204;
        }
        
        # 代理到你的 Node.js 服务
        proxy_pass http://127.0.0.1:8090;
        
        # 错误处理
        proxy_intercept_errors on;
        error_page 502 503 504 /50x.html;
    }
    
    # Nacos 控制台与原生 API：整个 /nacos/ 前缀统一认证
    location ^~ /nacos/ {
        auth_basic "Nacos Admin - 需要认证";
        auth_basic_user_file /etc/nginx/.htpasswd.nacos;

        proxy_pass http://127.0.0.1:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
    }
    
    # Nacos 公网只读配置入口：仅允许插件读取白名单 dataId，禁止写入/删除/任意 dataId 读取
    location ^~ /nacos-configs {
        # 仅允许公开读取插件必需的白名单 dataId；新增公开配置前必须确认不含敏感字段。
        if ($arg_dataId !~ ^(xhunt_config|xhunt_i18n|xhunt_campaigns|xhunt_built_in_tag|xhunt_built_in_tag_en)$) { return 404; }
        if ($arg_group != "DEFAULT_GROUP") { return 404; }

        # CORS 预检只开放只读方法，不允许 credentials。
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Requested-With" always;
            add_header Access-Control-Max-Age 600 always;
            return 204;
        }

        # 禁止 POST/PUT/DELETE 等写入类方法触达 Nacos。
        if ($request_method !~ ^(GET|HEAD)$) { return 405; }

        proxy_pass http://127.0.0.1:8848/nacos/v1/cs/configs;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;

        proxy_hide_header Cache-Control;
        proxy_hide_header Pragma;
        proxy_hide_header Expires;
        add_header Cache-Control "public, max-age=120, stale-while-revalidate=60" always;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Requested-With" always;
    }

    # Directus 面板反向代理
    location /directus/ {
        # OPTIONS 预检请求
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin *;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS";
            add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Requested-With, X-Real-IP, X-Forwarded-For, X-Forwarded-Proto";
            return 204;
        }

        proxy_pass http://127.0.0.1:8055/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 保持原始前缀，方便 Directus 生成正确 URL
        proxy_set_header X-Forwarded-Prefix /directus;
        proxy_set_header X-Forwarded-Host $host;

        # 关闭缓冲，避免文件上传被缓存
        proxy_buffering off;

        # 设置响应头
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Credentials "true" always;
    }

    location / {
        # OPTIONS 请求直接返回 204
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin *;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS";
            add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Request-Timestamp, x-request-id, x-request-timestamp, x-device-fingerprint, x-request-signature, x-extension-version, x-user-id, x-window-location-href, x-xhunt-web-sign-version, x-xhunt-web-client-key, x-xhunt-web-request-id, x-xhunt-web-timestamp, x-xhunt-web-body-sha256, x-xhunt-web-signature, x-xhunt-web-sdk-version, x-xhunt-web-page-url, x-xhunt-web-origin, x-collector-client-token, x-admin, Admin, admin";
            return 204;
        }
	      proxy_pass http://localhost:8087;
        gzip on;
	      gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
	      autoindex off;
	      proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

}
