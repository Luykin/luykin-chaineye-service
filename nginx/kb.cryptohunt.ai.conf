server {
    server_name kb.cryptohunt.ai;
    location /nacos/ {
        proxy_pass http://127.0.0.1:8080/;  # 注意结尾的斜杠，避免路径问题
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;        # 避免某些接口出现空白
    }
    location /nacos-configs {
        proxy_pass http://127.0.0.1:8848/nacos/v1/cs/configs;  # 注意结尾的斜杠，避免路径问题
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;        # 避免某些接口出现空白
	    # 添加 CORS 头
    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Requested-With, X-Real-IP, X-Forwarded-For, X-Forwarded-Proto" always;
    add_header Access-Control-Allow-Credentials "true" always;

    # 处理预检请求 (OPTIONS)
    if ($request_method = OPTIONS ) {
        return 204;
    }
    }
    location /sql {
	if ($request_method !~ ^(GET|POST)$ ) {
	    return 405;
	}
        proxy_pass http://localhost:5000;
        gzip on;
	gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
	autoindex off;
	proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        # OPTIONS 请求直接返回 204
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin *;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS";
            add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Request-Timestamp, x-request-id, x-request-timestamp, x-device-fingerprint, x-request-signature, x-extension-version, x-user-id, x-window-location-href";
            return 204;
        }
	proxy_pass http://localhost:8087;
        gzip on;
	gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
	autoindex off;
	proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /pgadmin/ {
        # 注意路径后加斜杠，确保路径重写正确
        proxy_pass http://localhost:8022/;  # 假设 PgAdmin 的 Docker 容器在 8080 上运行
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Make sure to handle /pgadmin correctly
        proxy_set_header X-Script-Name /pgadmin;
        proxy_cookie_path / /pgadmin/;  # 修复 cookie 路径

        # 保持 gzip
        gzip on;
        gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
        autoindex off;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/kb.cryptohunt.ai/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/kb.cryptohunt.ai/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}
server {
    if ($host = kb.cryptohunt.ai) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    server_name kb.cryptohunt.ai;
    return 404; # managed by Certbot


}
