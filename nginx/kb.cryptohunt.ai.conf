server {
    server_name kb.cryptohunt.ai kb.xhunt.ai;

    # 封禁指定 IP（优先使用 Cloudflare 真实客户端 IP；若无则 fallback 到 remote_addr）
    if ($blocked_kb = 1) { return 444; }
    if ($blocked_kb_ra = 1) { return 444; }

    # SSE (Server-Sent Events) 路由 - 必须放在其他 location 之前
    location /api/xhunt/sse {
        # SSE v2 安全参数通过 query 传输，URL 中会包含 token / x-request-signature。
        # 为避免敏感参数进入访问日志，这里关闭 SSE access_log；如需排查，建议临时启用脱敏日志格式。
        access_log off;
        error_log /var/log/nginx/sse_error.log warn;

        # 禁用所有缓冲，确保 SSE 实时传输
        proxy_buffering off;
        proxy_cache off;
        proxy_request_buffering off;

        # 设置 SSE 响应头
        proxy_set_header Connection "";
        proxy_http_version 1.1;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $host;

        # SSE 传输超时设置（长连接）
        proxy_connect_timeout 60s;    # 连接建立超时：60秒内必须建立与后端服务器的连接
        proxy_send_timeout 3600s;     # 发送超时：nginx 向后端发送数据的超时时间（对 SSE 影响不大）
        proxy_read_timeout 3600s;     # 读取超时：nginx 等待从后端服务器读取数据的最大时间
                                      # 工作原理：每次收到数据后，计时器会重置为 0
                                      # 如果连续 1 小时内没有收到后端任何数据，nginx 会断开连接
                                      # 注意：SSE 每30秒发送心跳，每次心跳会重置计时器，所以连接可以保持很久

        # 禁用 gzip 压缩（SSE 响应需要实时传输）
        proxy_set_header Accept-Encoding "";

        # 设置 SSE 响应头
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Connection "keep-alive" always;
        add_header X-Accel-Buffering "no" always;
        add_header Content-Type "text/event-stream" always;

        # 处理预检请求 (OPTIONS)
        if ($request_method = OPTIONS ) {
            add_header Access-Control-Allow-Origin *;
            add_header Access-Control-Allow-Methods "GET, OPTIONS";
            add_header Access-Control-Allow-Headers "Content-Type, Authorization, x-signature-version, x-request-id, x-request-timestamp, x-device-fingerprint, x-request-signature, x-extension-version, x-user-id, x-tw-id, x-language, x-window-location-href";
            return 204;
        }

        # 代理到你的 Node.js 服务（前缀匹配会自动保留路径）
        proxy_pass http://127.0.0.1:8087;

        # 错误处理
        proxy_intercept_errors on;
        error_page 502 503 504 = @sse_error;
    }

    # SSE 错误处理
    location @sse_error {
        access_log /var/log/nginx/sse_error_access.log;
        add_header Content-Type application/json always;
        return 502 '{"error":"SSE connection failed","message":"无法连接到后端服务器"}';
    }

    # LLM 测试接口 - 需要较长超时时间
    location = /api/admin/llm-test {
        proxy_pass http://127.0.0.1:8087;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        proxy_http_version 1.1;

        # 延长超时时间到 300 秒（5分钟），因为 LLM 调用可能较慢
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;

        # 禁用缓冲，确保及时响应
        proxy_buffering off;

        # CORS 头
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization, x-request-id" always;

        # 处理预检请求
        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    # 流式代理路由 - 必须放在其他 location 之前
    location ~* ^/api/xhunt/proxy/public-stream/ {
        # 禁用所有缓冲，确保流式传输
        proxy_buffering off;
        proxy_cache off;
        proxy_request_buffering off;

        # 设置流式响应头
        proxy_set_header Connection "";
        proxy_http_version 1.1;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $host;

        # 流式传输超时设置
        proxy_connect_timeout 60s;
        proxy_send_timeout 0;      # 无发送超时
        proxy_read_timeout 0;      # 无读取超时

        # 禁用 gzip 压缩（流式响应不需要）
        proxy_set_header Accept-Encoding "";

        # 设置流式响应头
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Connection "keep-alive" always;
        add_header X-Accel-Buffering "no" always;

        # 添加 CORS 头
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Request-Timestamp, x-signature-version, x-request-id, x-request-timestamp, x-device-fingerprint, x-request-signature, x-extension-version, x-user-id, x-tw-id, x-language, x-window-location-href, x-collector-client-token, x-admin, Admin" always;
        add_header Access-Control-Allow-Credentials "true" always;

        # 处理预检请求 (OPTIONS)
        if ($request_method = OPTIONS ) {
            add_header Access-Control-Allow-Origin *;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS";
            add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Request-Timestamp, x-signature-version, x-request-id, x-request-timestamp, x-device-fingerprint, x-request-signature, x-extension-version, x-user-id, x-tw-id, x-language, x-window-location-href, x-collector-client-token, x-admin, Admin";
            return 204;
        }

        # 代理到你的 Node.js 服务
        proxy_pass http://127.0.0.1:8090;

        # 错误处理
        proxy_intercept_errors on;
        error_page 502 503 504 /50x.html;
    }

    # Nacos 控制台与原生 API 不再直接暴露公网；配置读写统一走管理后台后端。
    location ^~ /nacos/ {
        return 404;
    }

    # Nacos 公网只读配置入口：仅允许插件读取白名单 dataId，禁止写入/删除/任意 dataId 读取
    location ^~ /nacos-configs {
        # 仅允许公开读取插件必需的白名单 dataId；新增公开配置前必须确认不含敏感字段。
        if ($arg_dataId !~ ^(xhunt_config|xhunt_i18n|xhunt_campaigns|xhunt_built_in_tag|xhunt_built_in_tag_en|xhunt_message)$) { return 404; }
        if ($arg_group != "DEFAULT_GROUP") { return 404; }

        # CORS 预检只开放只读方法，不允许 credentials。
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Requested-With" always;
            add_header Access-Control-Max-Age 600 always;
            return 204;
        }

        # 禁止 POST/PUT/DELETE 等写入类方法触达 Nacos。
        if ($request_method !~ ^(GET|HEAD)$) { return 405; }

        proxy_pass http://127.0.0.1:8848/nacos/v1/cs/configs;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;

        proxy_hide_header Cache-Control;
        proxy_hide_header Pragma;
        proxy_hide_header Expires;
        add_header Cache-Control "public, max-age=120, stale-while-revalidate=60" always;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Requested-With" always;
    }

    location / {
        # OPTIONS 请求直接返回 204
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin *;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS";
            add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Request-Timestamp, x-signature-version, x-request-id, x-request-timestamp, x-device-fingerprint, x-request-signature, x-extension-version, x-user-id, x-tw-id, x-language, x-window-location-href, x-xhunt-web-sign-version, x-xhunt-web-client-key, x-xhunt-web-request-id, x-xhunt-web-timestamp, x-xhunt-web-body-sha256, x-xhunt-web-signature, x-xhunt-web-sdk-version, x-xhunt-web-page-url, x-xhunt-web-origin, x-collector-client-token, x-admin, Admin, admin";
            return 204;
        }
	      proxy_pass http://localhost:8087;
        gzip on;
	      gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
	      autoindex off;
	      proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }



    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/kb.cryptohunt.ai/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/kb.cryptohunt.ai/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot


}

# ============================================================
# Supabase Studio - 管理后台 iframe 专用入口
# ============================================================
# 安全目标：
# 1) 不再开放 IP:8388 这种公网裸端口。
# 2) Supabase Studio 容器只监听本机 127.0.0.1:3000。
# 3) 管理后台 iframe 访问独立子域：
#      https://supabase-studio.cryptohunt.ai/project/default
# 4) 首次进入必须携带后端签发的短时 token，Nginx 通过 auth_request
#    调用 /admin/supabase/verify-link 校验；校验通过后写入 10 分钟
#    HttpOnly Cookie，后续 Studio 静态资源和数据接口都依赖该 Cookie。
#
# 部署前置条件：
# - DNS: supabase-studio.cryptohunt.ai 指向当前 Nginx 服务器。
# - TLS: 当前证书必须包含 supabase-studio.cryptohunt.ai；如果使用单独证书，
#        请替换下方 ssl_certificate / ssl_certificate_key 路径。
# - 后端环境变量建议保持或显式配置：
#        SUPABASE_STUDIO_ENTRY_URL=https://supabase-studio.cryptohunt.ai/project/default
# ============================================================
server {
    listen 443 ssl;
    server_name supabase-studio.cryptohunt.ai;

    ssl_certificate /etc/letsencrypt/live/kb.cryptohunt.ai/fullchain.pem; # 证书需覆盖 supabase-studio.cryptohunt.ai
    ssl_certificate_key /etc/letsencrypt/live/kb.cryptohunt.ai/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # 封禁指定 IP（沿用主站封禁变量；变量通常在 nginx http/map 中定义）
    if ($blocked_kb = 1) { return 444; }
    if ($blocked_kb_ra = 1) { return 444; }

    # Nginx 内部鉴权子请求：只允许由 auth_request 调用，外部不能直接访问。
    location = /_auth_supabase_studio {
        internal;

        # 首次进入 /project/default?token=xxx 时使用 URL token；
        # 后续静态资源 / 数据接口请求使用 HttpOnly Cookie:supaok。
        set $sig $cookie_supaok;
        if ($sig = "") { set $sig $supabase_studio_token; }

        proxy_pass http://127.0.0.1:8087/admin/supabase/verify-link;
        proxy_set_header X-Request-Signature "$sig";
        proxy_set_header Accept "application/json";
        proxy_set_header X-Requested-With "XMLHttpRequest";
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
    }

    # Studio 主页面入口：必须带短时 token 首次进入。
    location ^~ /project/default {
        set $supabase_studio_token $arg_token;
        auth_request /_auth_supabase_studio;
        error_page 401 403 = @supabase_studio_deny;

        # 校验通过后把 token 存到短时 HttpOnly Cookie，并 302 清理 URL token，
        # 避免 token 长时间停留在地址栏、浏览器历史或 Referer 中。
        if ($arg_token != "") {
            add_header Set-Cookie "supaok=$arg_token; Path=/; HttpOnly; Secure; Max-Age=600; SameSite=Lax" always;
            return 302 $uri;
        }

        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        # Supabase Studio/Next.js 可能使用 WebSocket 或长请求。
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_buffering off;

        # 允许被管理后台 iframe 嵌入；不要放开为 *。
        proxy_hide_header X-Frame-Options;
        proxy_hide_header Content-Security-Policy;
        add_header Content-Security-Policy "frame-ancestors https://kb.cryptohunt.ai https://kb.xhunt.ai" always;
    }

    # Studio 静态资源：也要求已经通过短时 Cookie 校验，避免外部随意探测资源。
    location ^~ /_next/ {
        set $supabase_studio_token "";
        auth_request /_auth_supabase_studio;
        error_page 401 403 = @supabase_studio_deny;

        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        expires 1h;
    }

    location ^~ /img/ {
        set $supabase_studio_token "";
        auth_request /_auth_supabase_studio;
        error_page 401 403 = @supabase_studio_deny;

        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        expires 1h;
    }

    location = /favicon.ico {
        set $supabase_studio_token "";
        auth_request /_auth_supabase_studio;
        error_page 401 403 = @supabase_studio_deny;

        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
    }

    # Studio 数据接口：必须保护，不能裸露给公网。
    # 用 /api/ 兜底，而不是只放行 pg-meta，避免 Studio 版本升级后新增内部 API 导致页面异常。
    location = /api {
        set $supabase_studio_token "";
        auth_request /_auth_supabase_studio;
        error_page 401 403 = @supabase_studio_deny;

        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_buffering off;
    }

    location ^~ /api/ {
        set $supabase_studio_token "";
        auth_request /_auth_supabase_studio;
        error_page 401 403 = @supabase_studio_deny;

        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_buffering off;
    }

    # 其他 Studio 路径统一走受保护代理；没有短时 Cookie 时会被拒绝。
    # 这样既不会开放裸入口，也能兼容 Studio 后续新增的非 /api 静态/页面路径。
    location / {
        set $supabase_studio_token "";
        auth_request /_auth_supabase_studio;
        error_page 401 403 = @supabase_studio_deny;

        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_buffering off;
    }

    location @supabase_studio_deny {
        default_type application/json;
        return 403 '{"success":false,"error":"SUPABASE_STUDIO_FORBIDDEN"}';
    }
}

server {
    # Supabase Studio 独立子域的 HTTP 请求统一跳转 HTTPS。
    if ($host = supabase-studio.cryptohunt.ai) {
        return 301 https://$host$request_uri;
    }

    if ($host = kb.xhunt.ai) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    if ($host = kb.cryptohunt.ai) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    server_name kb.cryptohunt.ai kb.xhunt.ai supabase-studio.cryptohunt.ai;
    listen 80;
    return 404; # managed by Certbot
}
