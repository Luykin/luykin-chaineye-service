server {
    server_name kb.cryptohunt.ai kb.xhunt.ai;

    # 封禁指定 IP（优先使用 Cloudflare 真实客户端 IP；若无则 fallback 到 remote_addr）
    if ($blocked_kb = 1) { return 444; }
    if ($blocked_kb_ra = 1) { return 444; }

    # SSE (Server-Sent Events) 路由 - 必须放在其他 location 之前
    location /api/xhunt/sse {
        # 添加访问日志和错误日志（调试用）
        access_log /var/log/nginx/sse_access.log;
        error_log /var/log/nginx/sse_error.log debug;

        # 禁用所有缓冲，确保 SSE 实时传输
        proxy_buffering off;
        proxy_cache off;
        proxy_request_buffering off;

        # 设置 SSE 响应头
        proxy_set_header Connection "";
        proxy_http_version 1.1;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $host;

        # SSE 传输超时设置（长连接）
        proxy_connect_timeout 60s;    # 连接建立超时：60秒内必须建立与后端服务器的连接
        proxy_send_timeout 3600s;     # 发送超时：nginx 向后端发送数据的超时时间（对 SSE 影响不大）
        proxy_read_timeout 3600s;     # 读取超时：nginx 等待从后端服务器读取数据的最大时间
                                      # 工作原理：每次收到数据后，计时器会重置为 0
                                      # 如果连续 1 小时内没有收到后端任何数据，nginx 会断开连接
                                      # 注意：SSE 每30秒发送心跳，每次心跳会重置计时器，所以连接可以保持很久

        # 禁用 gzip 压缩（SSE 响应需要实时传输）
        proxy_set_header Accept-Encoding "";

        # 设置 SSE 响应头
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Connection "keep-alive" always;
        add_header X-Accel-Buffering "no" always;
        add_header Content-Type "text/event-stream" always;

        # 处理预检请求 (OPTIONS)
        if ($request_method = OPTIONS ) {
            return 204;
        }

        # 代理到你的 Node.js 服务（前缀匹配会自动保留路径）
        proxy_pass http://127.0.0.1:8087;

        # 错误处理
        proxy_intercept_errors on;
        error_page 502 503 504 = @sse_error;
    }

    # SSE 错误处理
    location @sse_error {
        access_log /var/log/nginx/sse_error_access.log;
        add_header Content-Type application/json always;
        return 502 '{"error":"SSE connection failed","message":"无法连接到后端服务器"}';
    }

    # 流式代理路由 - 必须放在其他 location 之前
    location ~* ^/api/xhunt/proxy/public-stream/ {
        # 禁用所有缓冲，确保流式传输
        proxy_buffering off;
        proxy_cache off;
        proxy_request_buffering off;

        # 设置流式响应头
        proxy_set_header Connection "";
        proxy_http_version 1.1;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $host;

        # 流式传输超时设置
        proxy_connect_timeout 60s;
        proxy_send_timeout 0;      # 无发送超时
        proxy_read_timeout 0;      # 无读取超时

        # 禁用 gzip 压缩（流式响应不需要）
        proxy_set_header Accept-Encoding "";

        # 设置流式响应头
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Connection "keep-alive" always;
        add_header X-Accel-Buffering "no" always;

        # 添加 CORS 头
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Request-Timestamp, x-request-id, x-request-timestamp, x-device-fingerprint, x-request-signature, x-extension-version, x-user-id, x-window-location-href" always;
        add_header Access-Control-Allow-Credentials "true" always;

        # 处理预检请求 (OPTIONS)
        if ($request_method = OPTIONS ) {
            add_header Access-Control-Allow-Origin *;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS";
            add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Request-Timestamp, x-request-id, x-request-timestamp, x-device-fingerprint, x-request-signature, x-extension-version, x-user-id, x-window-location-href";
            return 204;
        }

        # 代理到你的 Node.js 服务
        proxy_pass http://127.0.0.1:8090;

        # 错误处理
        proxy_intercept_errors on;
        error_page 502 503 504 /50x.html;
    }

    location /nacos/ {
        proxy_pass http://127.0.0.1:8080/;  # 注意结尾的斜杠，避免路径问题
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;        # 避免某些接口出现空白
    }

    location /nacos-configs {
        proxy_pass http://127.0.0.1:8848/nacos/v1/cs/configs;  # 注意结尾的斜杠，避免路径问题
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;        # 避免某些接口出现空白

        # 浏览器缓存策略：强缓存 5 分钟 + 过期后“后台刷新窗口”30 分钟
        # - 背景：该接口上游可能返回 Cache-Control: no-cache,no-store，导致浏览器无法缓存。
        # - 做法：通过 proxy_hide_header 移除上游的 Cache-Control/Pragma/Expires，并由 Nginx 统一下发新的 Cache-Control。
        #
        # Cache-Control 含义（当前：public, max-age=300, stale-while-revalidate=1800）：
        # - public：允许浏览器/中间缓存（代理/CDN）缓存
        # - max-age=300：强缓存 300 秒（5 分钟）。这段时间内再次请求同一 URL，通常直接命中本地缓存，不发起网络请求。
        # - stale-while-revalidate=1800：当缓存超过 max-age 变“过期”后，在接下来的 1800 秒（30 分钟）内，
        #   客户端/中间缓存可以“先返回旧缓存（stale）”以保证秒开，同时在后台发起一次 revalidate/拉新请求去更新缓存。
        #   后台更新完成后，下一次请求会使用新内容。
        proxy_hide_header Cache-Control;
        proxy_hide_header Pragma;
        proxy_hide_header Expires;
        add_header Cache-Control "public, max-age=300, stale-while-revalidate=1800" always;

	      # 添加 CORS 头
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Requested-With, X-Real-IP, X-Forwarded-For, X-Forwarded-Proto" always;
        add_header Access-Control-Allow-Credentials "true" always;

        # 处理预检请求 (OPTIONS)
        if ($request_method = OPTIONS ) {
          return 204;
        }
    }

    location / {
        # OPTIONS 请求直接返回 204
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin *;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS";
            add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Request-Timestamp, x-request-id, x-request-timestamp, x-device-fingerprint, x-request-signature, x-extension-version, x-user-id, x-window-location-href";
            return 204;
        }
	      proxy_pass http://localhost:8087;
        gzip on;
	      gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
	      autoindex off;
	      proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }



    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/kb.cryptohunt.ai/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/kb.cryptohunt.ai/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot


}

 

# Supabase Studio - 通过 IP:8388 直接访问
server {
    listen 8388;
    server_name 150.5.158.179;

    # HTTP Basic Auth 保护（使用 htpasswd 文件）
    # 生成密码文件命令: htpasswd -c /etc/nginx/.htpasswd supabase
    # 或者使用: echo "supabase:$(openssl passwd -apr1 'your_password')" > /etc/nginx/.htpasswd
    auth_basic "Supabase Studio - 需要认证";
    auth_basic_user_file /etc/nginx/.htpasswd;

        # Nginx 内部子请求：校验一次性 token（给 auth_request 使用）
    location = /_auth_supabase_link {
        internal;
        auth_basic off;
        # 优先使用 Cookie 中的 supaok；若无，则回退到 URL token（$token）
        set $sig $cookie_supaok;
        if ($sig = "") { set $sig $token; }
        proxy_pass http://localhost:8087/admin/supabase/verify-link;
        proxy_set_header X-Request-Signature "$sig";
        proxy_set_header Accept "application/json";
        proxy_set_header X-Requested-With "XMLHttpRequest";
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
    }

    # 对 /project/default 及其子路径执行二次校验；其他路径（静态、JS、CSS、图片、API 等）不拦截
    location ^~ /project/default {
        set $token $arg_token;
        auth_request /_auth_supabase_link;
        auth_request_set $auth_status $upstream_status;
        if ($auth_status = 401) { return 403; }
        # 首次通过且校验成功（204）后：
        # 1) 若 URL 携带 token，则落 Cookie
        # 2) 立即 302 到无查询串的同一路径（清理 URL 中的 token）
        if ($arg_token != "") {
            add_header Set-Cookie "supaok=$arg_token; Path=/; HttpOnly; Max-Age=600; SameSite=Lax" always;
            return 302 $uri;
        }
        # # 调试观察头（完成后可删除）
        # add_header X-Debug-Auth-Status $auth_status always;
        # add_header X-Debug-Arg-Token $arg_token always;
        # add_header X-Debug-SupaOK $cookie_supaok always;

        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_hide_header WWW-Authenticate;

        # WebSocket 支持（Studio 可能需要）
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # 超时设置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # 禁用缓冲
        proxy_buffering off;

        # 添加 CORS 头（如果需要）
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
        add_header Access-Control-Allow-Credentials "true" always;
    }
    
    # 保护 Supabase pg-meta 查询接口，要求通过 /_auth_supabase_link 校验（基于 Cookie:supaok）
    location ~ ^/api/platform/pg-meta/default/query(?:$|[/?]) {
        # 简化校验：仅要求存在本地会话 Cookie（无需请求后端）
        if ($cookie_supaok = "") { return 403; }
        # 调试观察头（完成后可删除）
        add_header X-Debug-SupaOK $cookie_supaok always;

        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_buffering off;

        add_header X-Debug-Auth-Status $auth_status always;
    }

    # 其他资源全部直通，不执行 auth_request（放在正则规则之后）
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_buffering off;

        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
        add_header Access-Control-Allow-Credentials "true" always;
    }

    # 校验失败统一拒绝
    location @deny { return 403; }
}
server {
    if ($host = kb.xhunt.ai) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    if ($host = kb.cryptohunt.ai) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    server_name kb.cryptohunt.ai kb.xhunt.ai;
    listen 80;
    return 404; # managed by Certbot
}