# kb.cryptohunt.ai 站点配置 - 优化版本
# 解决前端5-20秒响应时间问题

# 定义上游服务器组 - 启用连接池和负载均衡
upstream backend_main {
    server localhost:8087 max_fails=3 fail_timeout=30s;
    # 保持32个长连接，减少连接建立开销
    keepalive 32;
    keepalive_requests 1000;
    keepalive_timeout 60s;
}

upstream backend_sql {
    server localhost:5000 max_fails=3 fail_timeout=30s;
    # SQL服务保持较少连接
    keepalive 16;
    keepalive_requests 500;
    keepalive_timeout 60s;
}

upstream backend_pgadmin {
    server localhost:8022 max_fails=3 fail_timeout=30s;
    # PgAdmin保持少量连接
    keepalive 8;
    keepalive_requests 100;
    keepalive_timeout 60s;
}

upstream backend_nacos {
    server 127.0.0.1:8080 max_fails=3 fail_timeout=30s;
    keepalive 16;
    keepalive_requests 500;
    keepalive_timeout 60s;
}

upstream backend_nacos_config {
    server 127.0.0.1:8848 max_fails=3 fail_timeout=30s;
    keepalive 8;
    keepalive_requests 200;
    keepalive_timeout 60s;
}

# 主服务器配置
server {
    server_name kb.cryptohunt.ai;

    # 启用HTTP/2以提高性能
    listen 443 ssl http2;

    # SSL证书配置
    ssl_certificate /etc/letsencrypt/live/kb.cryptohunt.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kb.cryptohunt.ai/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    ##
    # 全局速率限制 - 应用于所有location
    ##
    limit_req zone=general burst=50 nodelay;

    ##
    # 全局代理设置 - 适用于所有location
    ##

    # 使用HTTP/1.1和长连接
    proxy_http_version 1.1;
    proxy_set_header Connection "";

    # 标准代理头
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port $server_port;

    # 优化的超时设置
    proxy_connect_timeout 30s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    # 启用代理缓冲以提高性能
    proxy_buffering on;
    proxy_buffer_size 256k;
    proxy_buffers 8 256k;
    proxy_busy_buffers_size 512k;

    # 禁用代理重定向
    proxy_redirect off;

    ##
    # 静态资源缓存 - 减少服务器负载
    ##
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
        # 静态资源使用宽松的速率限制
        limit_req zone=static burst=200 nodelay;

        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Cache-Status "STATIC";
        access_log off;

        # 如果是代理的静态资源
        try_files $uri @backend;
    }

    ##
    # Nacos管理界面
    ##
    location /nacos/ {
        proxy_pass http://backend_nacos/;

        # Nacos特定设置
        proxy_set_header Accept-Encoding "";

        # 添加缓存控制
        add_header X-Cache-Status "NACOS";
    }

    ##
    # Nacos配置API - 需要CORS支持
    ##
    location /nacos-configs {
        proxy_pass http://backend_nacos_config/nacos/v1/cs/configs;

        # 优化的CORS设置 - 只在需要时添加
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Requested-With" always;
        add_header Access-Control-Max-Age 86400 always;

        # 处理预检请求
        if ($request_method = OPTIONS) {
            add_header Content-Length 0;
            add_header Content-Type text/plain;
            return 204;
        }

        add_header X-Cache-Status "NACOS-CONFIG";
    }

    ##
    # SQL查询接口 - 可能需要较长时间
    ##
    location /sql {
        # 限制请求方法
        if ($request_method !~ ^(GET|POST)$) {
            return 405;
        }

        proxy_pass http://backend_sql;

        # SQL查询可能需要更长时间
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;

        # 特殊的缓冲设置用于大结果集
        proxy_buffer_size 512k;
        proxy_buffers 16 512k;
        proxy_busy_buffers_size 1024k;

        add_header X-Cache-Status "SQL";
    }

    ##
    # PgAdmin管理界面
    ##
    location /pgadmin/ {
        proxy_pass http://backend_pgadmin/;

        # PgAdmin特定设置
        proxy_set_header X-Script-Name /pgadmin;
        proxy_cookie_path / /pgadmin/;

        # PgAdmin需要更长的超时时间
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_connect_timeout 60s;

        # 特殊缓冲设置
        proxy_buffer_size 512k;
        proxy_buffers 8 512k;

        add_header X-Cache-Status "PGADMIN";
    }

    ##
    # 登录等敏感操作 - 使用严格限制
    ##
    location ~ ^/(login|register|reset-password|admin) {
        # 应用严格的速率限制
        limit_req zone=strict burst=3 nodelay;

        proxy_pass http://backend_main;

        add_header X-Cache-Status "SENSITIVE";
    }

    ##
    # 主应用 - 默认路由
    ##
    location / {
        # 优化的CORS处理
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin *;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS";
            add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Request-Timestamp, x-request-id, x-request-timestamp, x-device-fingerprint, x-request-signature, x-extension-version, x-user-id, x-window-location-href";
            add_header Access-Control-Max-Age 86400;
            add_header Content-Length 0;
            add_header Content-Type text/plain;
            return 204;
        }

        proxy_pass http://backend_main;

        add_header X-Cache-Status "MAIN";
    }

    ##
    # 健康检查端点 - 不受速率限制
    ##
    location /health {
        # 健康检查不应用速率限制
        limit_req off;

        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    ##
    # Nginx状态监控 - 仅本地访问，不受速率限制
    ##
    location /nginx-status {
        limit_req off;

        stub_status on;
        access_log off;
        allow 127.0.0.1;
        allow ::1;
        deny all;
    }

    ##
    # 静态资源回退
    ##
    location @backend {
        proxy_pass http://backend_main;
    }

    ##
    # 错误页面
    ##
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;

    location = /50x.html {
        root /usr/share/nginx/html;
    }
}

# HTTP重定向到HTTPS
server {
    listen 80;
    server_name kb.cryptohunt.ai;

    # 健康检查不重定向，也不受速率限制
    location /health {
        limit_req off;
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # 其他请求重定向到HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}
