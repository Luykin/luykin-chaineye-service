user www-data;
worker_processes auto;
pid /run/nginx.pid;
error_log /var/log/nginx/error.log;
include /etc/nginx/modules-enabled/*.conf;

events {
    # 增加工作连接数以处理更多并发
    worker_connections 2048;
    # 启用多路复用，提高性能
    use epoll;
    multi_accept on;
}

http {
    ##
    # 基础设置
    ##
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    types_hash_max_size 2048;
    proxy_headers_hash_max_size 1024;
    proxy_headers_hash_bucket_size 128;

    # 隐藏nginx版本信息，提高安全性
    server_tokens off;

    ##
    # 优化的超时和缓冲设置 - 针对高延迟网络环境
    ##

    # 连接超时设置（减少到30秒，避免过长等待）
    proxy_connect_timeout 30s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    # 优化的缓冲区设置 - 增大缓冲区以减少网络往返
    proxy_buffer_size 256k;
    proxy_buffers 8 256k;
    proxy_busy_buffers_size 512k;
    proxy_temp_file_write_size 512k;
    proxy_max_temp_file_size 1024m;

    # 启用代理缓冲（默认开启，提高性能）
    proxy_buffering on;

    # 长连接优化 - 减少连接建立开销
    upstream_keepalive_connections 100;
    upstream_keepalive_requests 1000;
    upstream_keepalive_timeout 60s;

    # 客户端设置
    client_max_body_size 50M;
    client_body_timeout 60s;
    client_header_timeout 60s;
    client_body_buffer_size 256k;
    client_header_buffer_size 64k;
    large_client_header_buffers 4 64k;

    # MIME类型配置
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    ##
    # SSL设置 - 优化SSL性能
    ##
    ssl_protocols TLSv1.2 TLSv1.3; # 移除旧版本协议，提高安全性和性能
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES128-SHA256:ECDHE-RSA-AES256-SHA384;

    # SSL会话缓存，减少握手开销
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;

    ##
    # 日志设置
    ##
    # 定义日志格式，包含响应时间等性能指标
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log main;

    ##
    # Gzip压缩设置 - 减少传输数据量
    ##
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_min_length 1000;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    ##
    # 统一速率限制 - 通用限制策略
    ##
    # 基于IP的通用速率限制 - 每秒20个请求，突发50个
    limit_req_zone $binary_remote_addr zone=general:10m rate=20r/s;

    # 针对登录等敏感操作的严格限制 - 每秒1个请求，突发3个
    limit_req_zone $binary_remote_addr zone=strict:10m rate=1r/s;

    # 针对静态资源的宽松限制 - 每秒100个请求，突发200个
    limit_req_zone $binary_remote_addr zone=static:10m rate=100r/s;

    ##
    # 虚拟主机配置
    ##
    include /etc/nginx/conf.d/*.conf;
    include /etc/nginx/sites-enabled/*;
}
