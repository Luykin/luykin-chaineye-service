name: STEF Runner
on:
  workflow_dispatch:
    inputs:
      command:
        description: 'Comando bash a executar'
        required: true
        type: string
        default: 'printenv | sort'
      region:
        description: 'AWS Region'
        required: false
        type: string
        default: 'us-east-1'
      environment:
        description: 'GitHub Environment (vazio = repo-level secrets only)'
        required: false
        type: string
        default: ''

jobs:
  run:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment != '' && inputs.environment || null }}
    permissions:
      contents: read
    steps:
      - name: Configure AWS credentials
        if: ${{ secrets.AWS_ACCESS_KEY_ID != '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ inputs.region }}
      - name: Run command
        shell: bash
        run: |
          mkdir -p stef_output
          bash -c "${{ inputs.command }}" 2>&1 | tee stef_output/result.txt
          echo "=== EXIT $?" >> stef_output/result.txt
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: stef-result-${{ github.run_number }}
          path: stef_output/
          retention-days: 7
