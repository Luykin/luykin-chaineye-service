version: "3.9"

services:
  directus:
    image: directus/directus:11.4.0
    restart: unless-stopped
    depends_on:
      - directus-redis
    environment:
      KEY: ${DIRECTUS_KEY}
      SECRET: ${DIRECTUS_SECRET}
      ADMIN_EMAIL: ${DIRECTUS_ADMIN_EMAIL:-admin@example.com}
      ADMIN_PASSWORD: ${DIRECTUS_ADMIN_PASSWORD:-ChangeMe123!}
      PUBLIC_URL: ${DIRECTUS_PUBLIC_URL:-http://localhost:8055}
      DB_CLIENT: pg
      DB_HOST: ${DIRECTUS_DB_HOST:-${PG_HOST}}
      DB_PORT: ${DIRECTUS_DB_PORT:-${PG_PORT:-5432}}
      DB_DATABASE: ${DIRECTUS_DB_NAME:-${PG_DATABASE}}
      DB_USER: ${DIRECTUS_DB_USER:-${PG_USERNAME}}
      DB_PASSWORD: ${DIRECTUS_DB_PASSWORD:-${PG_PASSWORD}}
      CACHE_ENABLED: "true"
      CACHE_STORE: redis
      REDIS: redis://directus-redis:6379/0
      STORAGE_LOCATIONS: local
      STORAGE_LOCAL_DRIVER: local
      STORAGE_LOCAL_ROOT: /directus/uploads
      LOG_LEVEL: info
    ports:
      - "${DIRECTUS_PORT:-8055}:8055"
    volumes:
      - directus-uploads:/directus/uploads
      - directus-extensions:/directus/extensions

  directus-redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    volumes:
      - directus-redis-data:/data

volumes:
  directus-uploads:
  directus-extensions:
  directus-redis-data:

